<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Caixa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

header{
  background:#000;
  padding:12px;
  text-align:center;
  border-bottom:1px solid #222;
  position:relative;
}

header h1{
  margin:0;
  font-size:18px;
}

header small{
  color:#aaa;
}

/* 3 PONTOS */
.menu{
  position:absolute;
  right:15px;
  top:12px;
  font-size:22px;
  cursor:pointer;
}

/* BOTÕES */
.toolbar{
  display:flex;
  gap:8px;
  padding:10px;
}

.toolbar button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f1f1f;
  color:#fff;
}

/* FORM */
.filters{
  padding:10px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#1c1c1c;
  color:#fff;
}

/* LISTA */
.table{
  padding:10px;
}

.row{
  background:#121212;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}

.green{color:#00e676}
.red{color:#ff5252}

/* RODAPÉ */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
  border-top:1px solid #222;
}

.footer div{
  display:flex;
  justify-content:space-between;
  margin:3px 0;
}
</style>
</head>

<body>

<header>
<h1>Controle de Caixa</h1>
<small>Dinho Oliveira</small>
<div class="menu" onclick="relatorio()">⋮</div>
</header>

<div class="toolbar">
<button onclick="addType('income')">Crédito</button>
<button onclick="addType('expense')">Débito</button>
<button onclick="clearAll()">Excluir</button>
</div>

<div class="filters">
<input type="text" id="desc" placeholder="Histórico">
<input type="number" id="amount" placeholder="Valor">
</div>

<div class="table" id="list"></div>

<div class="footer">
<div>
<span>Total Crédito:</span>
<span id="totalIn">0</span>
</div>
<div>
<span>Total Débito:</span>
<span id="totalOut">0</span>
</div>
<div>
<b>Saldo:</b>
<b id="balance">0</b>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("caixa")||"[]");
let currentType = "income";

function addType(type){
  currentType = type;
  add();
}

function add(){
  let desc = document.getElementById("desc").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if(!desc || !amount){
    alert("Preencha os campos");
    return;
  }

  data.push({desc,amount,type:currentType});
  save();
  render();

  document.getElementById("desc").value="";
  document.getElementById("amount").value="";
}

function save(){
  localStorage.setItem("caixa", JSON.stringify(data));
}

function clearAll(){
  if(confirm("Apagar tudo?")){
    data=[];
    save();
    render();
  }
}

/* RELATÓRIO */
function relatorio(){
  let texto = "RELATÓRIO DE CAIXA\n\n";

  let totalIn=0;
  let totalOut=0;

  data.forEach(item=>{
    texto += `${item.desc} - R$ ${item.amount}\n`;

    if(item.type==="income") totalIn+=item.amount;
    else totalOut+=item.amount;
  });

  texto += `\nTotal Entrada: ${totalIn}`;
  texto += `\nTotal Saída: ${totalOut}`;
  texto += `\nSaldo: ${totalIn-totalOut}`;

  alert(texto);
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML="";

  let totalIn=0;
  let totalOut=0;

  data.forEach(item=>{
    if(item.type==="income") totalIn+=item.amount;
    else totalOut+=item.amount;

    list.innerHTML+=`
    <div class="row">
      <b>${item.desc}</b><br>
      <span class="${item.type==="income"?"green":"red"}">
        ${item.type==="income"?"+":"-"} R$ ${item.amount.toFixed(2)}
      </span>
    </div>
    `;
  });

  document.getElementById("totalIn").innerText = totalIn.toFixed(2);
  document.getElementById("totalOut").innerText = totalOut.toFixed(2);
  document.getElementById("balance").innerText = (totalIn-totalOut).toFixed(2);
}

render();
</script>

</body>
</html>
