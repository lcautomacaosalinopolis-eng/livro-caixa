<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Caixa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header{
  background:#000;
  padding:10px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* BOTÕES TOPO */
.toolbar{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
}

.toolbar button{
  flex:1;
  min-width:120px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:#fff;
}

/* FILTROS */
.filters{
  padding:10px;
}

.filters input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* LISTA */
.table{
  padding:10px;
}

.row{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.row small{
  color:#aaa;
}

.green{color:#00b894}
.red{color:#ff7675}

/* RODAPÉ */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
  font-size:14px;
}

.footer div{
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<header>Controle de Caixa</header>

<div class="toolbar">
<button onclick="addType('income')">Crédito</button>
<button onclick="addType('expense')">Débito</button>
<button onclick="alert('Em breve')">Transferir</button>
<button onclick="alert('Em breve')">Editar</button>
<button onclick="clearAll()">Excluir</button>
</div>

<div class="filters">
<input type="text" id="desc" placeholder="Histórico">
<input type="number" id="amount" placeholder="Valor">
<input type="date" id="date">
</div>

<div class="table" id="list"></div>

<div class="footer">
<div>
<span>Total Crédito:</span>
<span id="totalIn">0</span>
</div>
<div>
<span>Total Débito:</span>
<span id="totalOut">0</span>
</div>
<div>
<b>Saldo:</b>
<b id="balance">0</b>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("caixa")||"[]");
let currentType = "income";

function addType(type){
  currentType = type;
  add();
}

function add(){
  let desc = document.getElementById("desc").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let date = document.getElementById("date").value;

  if(!desc || !amount) return alert("Preencha os campos");

  data.push({desc,amount,date,type:currentType});
  save();
  render();

  desc.value="";
  amount.value="";
}

function save(){
  localStorage.setItem("caixa", JSON.stringify(data));
}

function clearAll(){
  if(confirm("Apagar tudo?")){
    data=[];
    save();
    render();
  }
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML="";

  let totalIn=0;
  let totalOut=0;

  data.forEach(item=>{
    if(item.type==="income") totalIn+=item.amount;
    else totalOut+=item.amount;

    list.innerHTML+=`
    <div class="row">
      <b>${item.desc}</b><br>
      <small>${item.date}</small><br>
      <span class="${item.type==="income"?"green":"red"}">
        ${item.type==="income"?"+":"-"} R$ ${item.amount.toFixed(2)}
      </span>
    </div>
    `;
  });

  document.getElementById("totalIn").innerText = totalIn.toFixed(2);
  document.getElementById("totalOut").innerText = totalOut.toFixed(2);
  document.getElementById("balance").innerText = (totalIn-totalOut).toFixed(2);
}

render();
</script>

</body>
</html>
